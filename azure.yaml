name: propagate-id-entra
services:
  orders-api:
    project: ./src/orders-api
    language: docker
    host: containerapp
    docker:
      path: ./Dockerfile
      remoteBuild: true
  chat-app:
    project: ./src/chat-app
    language: docker
    host: containerapp
    docker:
      path: ./Dockerfile
      remoteBuild: true
hooks:
  postprovision:
    shell: sh
    run: hooks/postprovision.sh
    continueOnError: true
    interactive: true
